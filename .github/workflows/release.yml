name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Test
        run: go test ./...
      - name: Build (Windows + macOS universal)
        run: bash scripts/build.sh
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ClaudeMigrator-win.exe
            dist/ClaudeMigrator-mac.tar.gz
